<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #efefef;
    --surface: #1a1d27;
    --border:  #2a2d3e;
    --accent:  #7c6af7;
    --accent2: #4fc3f7;
    --text:    #999999;
    --muted:   #6b6f8a;
    --code-bg: #12141f;
    --hover:   #222536;
    --active:  rgba(124,106,247,0.15);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* Header */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px; height: 50px;
    background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .logo { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--accent); }
  .logo span { color: var(--accent2); }
  .repo-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
  }
  .repo-badge svg { opacity: 0.5; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .hbtn {
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
    padding: 5px 13px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .hbtn:hover { border-color: var(--accent); color: var(--accent); }
  .hbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Body */
  .body { flex: 1; display: flex; overflow: hidden; }

  /* Sidebar */
  #sidebar {
    width: 250px; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar-header { padding: 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
  .sidebar-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 6px; }
  .branch-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    background: rgba(124,106,247,0.15); color: var(--accent);
    padding: 2px 7px; border-radius: 4px; margin-left: auto;
  }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); pointer-events: none; }
  #search {
    width: 100%; padding: 6px 10px 6px 30px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 12px;
    outline: none; transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .refresh-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; padding: 6px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-family: 'Inter', sans-serif; font-size: 11px;
    cursor: pointer; transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.loading svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #file-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .file-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; cursor: pointer;
    border-left: 2px solid transparent; transition: all 0.1s;
  }
  .file-item:hover { background: var(--hover); }
  .file-item.active { background: var(--active); border-left-color: var(--accent); }
  .fi-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .fi-size { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .file-item svg { flex-shrink: 0; opacity: 0.45; }
  .file-item.active svg { opacity: 1; }

  .file-count { font-size: 10px; color: var(--muted); }

  .empty-list { padding: 28px 16px; text-align: center; color: var(--muted); font-size: 12px; line-height: 1.8; }
  .error-msg { padding: 16px; color: #f87171; font-size: 12px; line-height: 1.7; background: rgba(248,113,113,0.08); margin: 8px; border-radius: 8px; border: 1px solid rgba(248,113,113,0.2); }

  /* Resize handle */
  #resize-handle { width: 4px; cursor: col-resize; background: transparent; transition: background 0.15s; flex-shrink: 0; }
  #resize-handle:hover, #resize-handle.dragging { background: var(--accent); }

  /* Main */
  #main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .welcome-icon { width: 64px; height: 64px; border-radius: 50%; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; }
  .welcome-icon svg { opacity: 0.3; }
  #welcome h2 { font-size: 16px; font-weight: 600; }
  #welcome p { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.7; }

  /* Doc bar */
  #doc-bar {
    display: none; align-items: center; gap: 10px;
    padding: 0 20px; height: 42px;
    border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
  }
  .doc-title { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; }
  .doc-meta { font-size: 11px; color: var(--muted); }
  .doc-link { margin-left: auto; }
  .doc-link a {
    font-size: 11px; color: var(--muted); text-decoration: none;
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 5px;
    transition: all 0.15s;
  }
  .doc-link a:hover { border-color: var(--accent); color: var(--accent); }

  /* Content */
  #content-area { display: none; flex: 1; overflow: hidden; }
  .split { display: flex; height: 100%; }
  .pane-editor, .pane-preview { flex: 1; overflow-y: auto; padding: 32px 36px; }
  .pane-editor { border-right: 1px solid var(--border); background: var(--code-bg); }
  textarea#editor {
    width: 100%; height: 100%;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.8;
    background: transparent; border: none; outline: none; color: var(--text); resize: none;
  }
  .split.preview-only .pane-editor { display: none; }

  /* Markdown */
  .md-body { font-size: 15px; line-height: 1.85; color: var(--text); max-width: 780px; }
  .md-body h1,.md-body h2,.md-body h3,.md-body h4 { font-weight: 600; margin: 1.6em 0 0.5em; line-height: 1.3; }
  .md-body h1 { font-size: 1.9em; color: #fff; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
  .md-body h2 { font-size: 1.35em; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .md-body h3 { font-size: 1.12em; color: var(--accent2); }
  .md-body h4 { font-size: 0.95em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .md-body p { margin: 0.85em 0; }
  .md-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(124,106,247,0.3); }
  .md-body a:hover { border-color: var(--accent); }
  .md-body strong { color: #fff; font-weight: 600; }
  .md-body em { color: var(--accent2); font-style: italic; }
  .md-body ul,.md-body ol { padding-left: 1.6em; margin: 0.7em 0; }
  .md-body li { margin: 0.3em 0; }
  .md-body blockquote { border-left: 3px solid var(--accent); margin: 1.2em 0; padding: 0.6em 1.2em; background: rgba(124,106,247,0.06); border-radius: 0 6px 6px 0; color: var(--muted); }
  .md-body code { font-family: 'JetBrains Mono', monospace; font-size: 0.84em; background: var(--code-bg); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; color: var(--accent2); }
  .md-body pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; overflow-x: auto; margin: 1.2em 0; }
  .md-body pre code { background: none; border: none; padding: 0; font-size: 13px; color: var(--text); line-height: 1.7; }
  .md-body table { width: 100%; border-collapse: collapse; margin: 1.2em 0; font-size: 14px; }
  .md-body th { background: var(--surface); color: var(--accent); font-weight: 600; text-align: left; padding: 10px 14px; border-bottom: 2px solid var(--accent); }
  .md-body td { padding: 9px 14px; border-bottom: 1px solid var(--border); }
  .md-body tr:hover td { background: rgba(255,255,255,0.02); }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
  .md-body img { max-width: 100%; border-radius: 8px; margin: 1em 0; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* Skeleton */
  .skeleton { background: var(--border); border-radius: 4px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .sk-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; }
  .sk-icon { width: 13px; height: 13px; border-radius: 3px; flex-shrink:0; }
  .sk-text { height: 11px; border-radius: 3px; }

  #toast {
    position: fixed; bottom: 22px; right: 22px;
    background: #4ade80; color: #000;
    font-size: 12px; font-weight: 600;
    padding: 9px 16px; border-radius: 7px;
    opacity: 0; transform: translateY(6px); transition: all 0.2s; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">md<span>.</span>view</div>
  <div class="repo-badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
    howardchoi-nsus/poc_ax · prd
  </div>
  <div class="header-actions">
    <button class="hbtn active" id="btn-preview">미리보기</button>
    <button class="hbtn" id="btn-split">분할 보기</button>
    <button class="hbtn" id="btn-copy">복사</button>
  </div>
</header>

<div class="body">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        prd 폴더
        <span class="branch-tag">main</span>
      </div>
      <div class="search-wrap">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="파일 검색...">
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span class="file-count" id="file-count"></span>
        <button class="refresh-btn" id="refresh-btn" style="width:auto;padding:4px 10px;">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          새로고침
        </button>
      </div>
    </div>
    <div id="file-list">
      <div class="empty-list">불러오는 중...</div>
    </div>
  </div>

  <div id="resize-handle"></div>

  <div id="main-area">
    <div id="welcome">
      <div class="welcome-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </div>
      <h2>파일을 선택하세요</h2>
      <p>좌측 목록에서 MD 파일을 클릭하면<br>여기에 렌더링됩니다</p>
    </div>

    <div id="doc-bar">
      <span class="doc-title" id="doc-title"></span>
      <span class="doc-meta" id="doc-meta"></span>
      <div class="doc-link">
        <a id="gh-link" href="#" target="_blank">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          GitHub에서 보기
        </a>
      </div>
    </div>

    <div id="content-area">
      <div class="split preview-only">
        <div class="pane-editor"><textarea id="editor" spellcheck="false"></textarea></div>
        <div class="pane-preview"><div class="md-body" id="preview"></div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast">✓ 복사 완료</div>

<script>
// ── Config ──────────────────────────────────────────
const OWNER  = 'howardchoi-nsus';
const REPO   = 'poc_ax';
const BRANCH = 'main';
const FOLDER = 'prd';
const API    = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}?ref=${BRANCH}`;
const RAW    = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${FOLDER}`;
const GH_URL = `https://github.com/${OWNER}/${REPO}/blob/${BRANCH}/${FOLDER}`;
// ────────────────────────────────────────────────────

marked.setOptions({ breaks: true, gfm: true });

let allFiles = [];
let activeIdx = null;
let currentMode = 'preview';

const fileList   = document.getElementById('file-list');
const fileCount  = document.getElementById('file-count');
const search     = document.getElementById('search');
const welcome    = document.getElementById('welcome');
const docBar     = document.getElementById('doc-bar');
const docTitle   = document.getElementById('doc-title');
const docMeta    = document.getElementById('doc-meta');
const ghLink     = document.getElementById('gh-link');
const contentArea= document.getElementById('content-area');
const editor     = document.getElementById('editor');
const preview    = document.getElementById('preview');
const split      = document.querySelector('.split');
const toast      = document.getElementById('toast');
const btnPreview = document.getElementById('btn-preview');
const btnSplit   = document.getElementById('btn-split');
const btnCopy    = document.getElementById('btn-copy');
const refreshBtn = document.getElementById('refresh-btn');

// ── Fetch file list ──────────────────────────────────
async function fetchFileList() {
  setLoading(true);
  try {
    const res = await fetch(API);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    allFiles = data
      .filter(f => f.type === 'file' && /\.(md|markdown)$/i.test(f.name))
      .sort((a, b) => a.name.localeCompare(b.name));
    fileCount.textContent = `${allFiles.length}개 파일`;
    renderList(allFiles);
  } catch (e) {
    fileList.innerHTML = `<div class="error-msg">⚠️ 불러오기 실패<br><br>${e.message}<br><br>레포가 공개(public)인지, 폴더 경로가 올바른지 확인하세요.</div>`;
    fileCount.textContent = '';
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  refreshBtn.classList.toggle('loading', on);
  if (on) {
    fileList.innerHTML = [1,2,3,4,5].map(i => `
      <div class="sk-item">
        <div class="skeleton sk-icon"></div>
        <div class="skeleton sk-text" style="width:${55+i*7}%"></div>
      </div>`).join('');
    fileCount.textContent = '불러오는 중...';
  }
}

// ── Render list ──────────────────────────────────────
function renderList(files) {
  if (!files.length) {
    fileList.innerHTML = '<div class="empty-list">MD 파일이 없습니다</div>';
    return;
  }
  fileList.innerHTML = files.map((f, i) => {
    const origIdx = allFiles.indexOf(f);
    const name = f.name.replace(/\.(md|markdown)$/i, '');
    const size = formatSize(f.size);
    return `<div class="file-item${origIdx === activeIdx ? ' active' : ''}" data-idx="${origIdx}">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span class="fi-name" title="${f.name}">${name}</span>
      <span class="fi-size">${size}</span>
    </div>`;
  }).join('');

  fileList.querySelectorAll('.file-item').forEach(el => {
    el.addEventListener('click', () => openFile(parseInt(el.dataset.idx)));
  });
}

// ── Open file ────────────────────────────────────────
async function openFile(idx) {
  const f = allFiles[idx];
  if (!f) return;
  activeIdx = idx;

  // Highlight
  fileList.querySelectorAll('.file-item').forEach(el =>
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx)
  );

  // Show loading in preview
  preview.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:20px 0;">불러오는 중...</div>`;
  welcome.style.display = 'none';
  docBar.style.display = 'flex';
  contentArea.style.display = 'block';

  try {
    const res = await fetch(`${RAW}/${f.name}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();

    editor.value = text;
    preview.innerHTML = marked.parse(text);
    docTitle.textContent = f.name;
    docMeta.textContent = `${formatSize(f.size)} · ${text.replace(/\s+/g,'').length}자`;
    ghLink.href = `${GH_URL}/${f.name}`;
  } catch (e) {
    preview.innerHTML = `<div style="color:#f87171;font-size:13px;">파일을 불러오지 못했습니다: ${e.message}</div>`;
  }
}

// ── Helpers ──────────────────────────────────────────
function formatSize(bytes) {
  if (!bytes) return '-';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}

// ── Search ───────────────────────────────────────────
search.addEventListener('input', () => {
  const q = search.value.trim().toLowerCase();
  renderList(q ? allFiles.filter(f => f.name.toLowerCase().includes(q)) : allFiles);
});

// ── Editor live preview ──────────────────────────────
editor.addEventListener('input', () => {
  preview.innerHTML = marked.parse(editor.value);
});

// ── Mode ─────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  split.classList.toggle('preview-only', mode === 'preview');
  btnPreview.classList.toggle('active', mode === 'preview');
  btnSplit.classList.toggle('active', mode === 'split');
}
btnPreview.addEventListener('click', () => setMode('preview'));
btnSplit.addEventListener('click', () => setMode('split'));

// ── Copy ─────────────────────────────────────────────
btnCopy.addEventListener('click', () => {
  if (activeIdx === null) return;
  navigator.clipboard.writeText(editor.value).then(() => {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
});

// ── Refresh ──────────────────────────────────────────
refreshBtn.addEventListener('click', fetchFileList);

// ── Sidebar resize ───────────────────────────────────
const handle  = document.getElementById('resize-handle');
const sidebar = document.getElementById('sidebar');
let dragging = false, startX = 0, startW = 0;
handle.addEventListener('mousedown', e => {
  dragging = true; startX = e.clientX; startW = sidebar.offsetWidth;
  handle.classList.add('dragging');
  document.body.style.cssText += 'cursor:col-resize;user-select:none';
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  sidebar.style.width = Math.min(380, Math.max(160, startW + e.clientX - startX)) + 'px';
});
document.addEventListener('mouseup', () => {
  dragging = false; handle.classList.remove('dragging');
  document.body.style.cursor = ''; document.body.style.userSelect = '';
});

// ── Init ─────────────────────────────────────────────
fetchFileList();
</script>
</body>
</html>
