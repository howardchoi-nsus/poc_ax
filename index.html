<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGENT Workspace</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fc;
      color: #111827;
      font-size: 14px;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .landing_shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #f6f8fc;
    }
    .landing_header {
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 28px;
      border-bottom: 1px solid #dfe6f2;
      background: #fff;
    }
    .landing_brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .login_logo {
      width: 128px;
      height: 40px;
      margin-bottom: 18px;
      background-image: url("https://nsuslab.com/assets/nsuslab_logo-DIbegr9K.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: left center;
    }
    .landing_title { margin: 0; font-size: 16px; font-weight: 800; }
    .landing_subtitle { margin: 4px 0 0; color: #94a3b8; font-size: 11px; letter-spacing: 0.12em; }
    .landing_header_status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 7px;
      background: #fff7ed;
      color: #c2410c;
      font-size: 12px;
      font-weight: 800;
    }
    .landing_header_status.is_signed_in {
      background: #eaf8ef;
      color: #16a34a;
    }
    .landing_main {
      width: min(1080px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 44px 0;
      display: grid;
      align-content: center;
      min-height: calc(100vh - 76px);
    }
    .login_view,
    .menu_view {
      display: none;
    }
    .login_view.is_active,
    .menu_view.is_active {
      display: grid;
    }
    .login_card {
      width: min(420px, 100%);
      margin: 0 auto;
      padding: 28px;
      border: 1px solid #dfe6f2;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 14px 40px rgba(20, 35, 70, 0.08);
    }
    .login_card h2,
    .menu_head h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }
    .login_card p,
    .menu_head p {
      margin: 8px 0 0;
      color: #63708a;
      line-height: 1.6;
    }
    .login_form {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }
    .login_hint {
      margin-top: 12px;
      color: #7b879c;
      font-size: 12px;
      line-height: 1.5;
    }
    .login_label {
      display: grid;
      gap: 7px;
      color: #50607a;
      font-size: 13px;
      font-weight: 800;
    }
    .login_input {
      width: 100%;
      height: 42px;
      border: 1px solid #dfe6f2;
      border-radius: 8px;
      padding: 0 12px;
      color: #111827;
      outline: 0;
      background: #fff;
    }
    .login_input:focus {
      border-color: #9db3ef;
      box-shadow: 0 0 0 3px rgba(71, 104, 216, 0.1);
    }
    .landing_primary_button {
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      font-weight: 900;
    }
    .login_error {
      min-height: 20px;
      color: #ef4444;
      font-size: 12px;
      font-weight: 700;
    }
    .menu_view {
      gap: 22px;
    }
    .menu_head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
    }
    .logout_button {
      height: 34px;
      padding: 0 14px;
      border: 1px solid #dfe6f2;
      border-radius: 8px;
      background: #fff;
      color: #334155;
      font-weight: 800;
    }
    .service_grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }
    .service_card {
      min-height: 176px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      padding: 18px;
      border: 1px solid #dfe6f2;
      border-radius: 10px;
      background: #fff;
      color: #111827;
      text-align: left;
      box-shadow: 0 10px 28px rgba(20, 35, 70, 0.06);
      text-decoration: none;
    }
    .service_card:hover {
      border-color: #9db3ef;
      transform: translateY(-1px);
    }
    .service_card.is_available {
      border-color: #9db3ef;
      background: linear-gradient(180deg, #fff 0%, #f7f9ff 100%);
      box-shadow: 0 14px 34px rgba(71, 104, 216, 0.14);
    }
    .service_card.is_disabled {
      color: #94a3b8;
      background: #f9fbff;
      cursor: not-allowed;
      box-shadow: none;
    }
    .service_card strong {
      display: block;
      font-size: 18px;
      font-weight: 900;
    }
    .service_card span {
      color: #63708a;
      line-height: 1.5;
      font-size: 12px;
    }
    .service_card.is_disabled span { color: #a6b1c3; }
    .service_badge {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 6px;
      background: #eef3ff;
      color: #4768d8;
      font-size: 11px;
      font-weight: 900;
    }
    .service_card.is_available .service_badge {
      background: #1f2a44;
      color: #fff;
    }
    .service_card.is_disabled .service_badge {
      background: #eef2f7;
      color: #96a2ba;
    }
    @media (max-width: 960px) {
      .service_grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .menu_head { align-items: flex-start; flex-direction: column; }
    }
    @media (max-width: 560px) {
      .landing_header { height: auto; padding: 14px 18px; align-items: flex-start; flex-direction: column; }
      .landing_main { width: min(100vw - 24px, 1080px); padding: 24px 0; min-height: auto; }
      .service_grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="landing_shell">
    <header class="landing_header">
      <section class="landing_brand">
        <div>
          <h1 class="landing_title">AGENT Workspace</h1>
          <p class="landing_subtitle">AI-NATIVE SERVICE BUILDER</p>
        </div>
      </section>
      <span class="landing_header_status" id="landing_status">Login Required</span>
    </header>

    <main class="landing_main">
      <section class="login_view is_active" id="login_view">
        <div class="login_card">
          <div class="login_logo" aria-label="NSUSLAB logo"></div>
          <h2>서비스 로그인</h2>
          <p>계정 ID를 입력하고 서비스 작업 공간으로 이동합니다.</p>
          <div class="login_hint">데모 접속: ID는 자유롭게 입력하고 Password는 1234를 사용합니다.</div>
          <form class="login_form" id="login_form">
            <label class="login_label">
              ID
              <input class="login_input" id="login_id" type="text" autocomplete="username" placeholder="ID를 입력하세요" />
            </label>
            <label class="login_label">
              Password
              <input class="login_input" id="login_password" type="password" autocomplete="current-password" placeholder="Password" />
            </label>
            <div class="login_error" id="login_error"></div>
            <button class="landing_primary_button" type="submit">로그인</button>
          </form>
        </div>
      </section>

      <section class="menu_view" id="menu_view">
        <div class="menu_head">
          <div>
            <h2>서비스 선택</h2>
            <p>진행할 작업 유형을 선택합니다.</p>
          </div>
          <button class="logout_button" id="logout_button" type="button">로그아웃</button>
        </div>

        <div class="service_grid">
          <a class="service_card is_available" href="./prd.html" aria-label="PRD 서비스로 이동">
            <div>
              <strong>PRD</strong>
              <span>요구사항을 선택하고 PRD 문서를 생성합니다.</span>
            </div>
            <em class="service_badge">사용 가능</em>
          </a>

          <button class="service_card is_disabled" type="button" disabled>
            <div>
              <strong>서비스 시나리오</strong>
              <span>PRD 기반 시나리오 산출물을 구성합니다.</span>
            </div>
            <em class="service_badge">준비중</em>
          </button>

          <button class="service_card is_disabled" type="button" disabled>
            <div>
              <strong>UI 생성</strong>
              <span>화면 구조와 인터페이스 초안을 만듭니다.</span>
            </div>
            <em class="service_badge">준비중</em>
          </button>

          <button class="service_card is_disabled" type="button" disabled>
            <div>
              <strong>코드 생성</strong>
              <span>정의된 화면과 정책을 코드 산출물로 전환합니다.</span>
            </div>
            <em class="service_badge">준비중</em>
          </button>

          <button class="service_card is_disabled" type="button" disabled>
            <div>
              <strong>TC</strong>
              <span>테스트 케이스와 검증 항목을 생성합니다.</span>
            </div>
            <em class="service_badge">준비중</em>
          </button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const loginView = document.getElementById('login_view');
    const menuView = document.getElementById('menu_view');
    const loginForm = document.getElementById('login_form');
    const loginId = document.getElementById('login_id');
    const loginPassword = document.getElementById('login_password');
    const loginError = document.getElementById('login_error');
    const landingStatus = document.getElementById('landing_status');
    const logoutButton = document.getElementById('logout_button');

    function showMenu() {
      loginView.classList.remove('is_active');
      menuView.classList.add('is_active');
      landingStatus.textContent = 'Service Menu';
      landingStatus.classList.add('is_signed_in');
    }

    function showLogin() {
      menuView.classList.remove('is_active');
      loginView.classList.add('is_active');
      landingStatus.textContent = 'Login Required';
      landingStatus.classList.remove('is_signed_in');
      loginPassword.value = '';
      loginId.focus();
    }

    if (sessionStorage.getItem('agent_workspace_logged_in') === 'true') {
      showMenu();
    }

    loginForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const id = loginId.value.trim();
      const password = loginPassword.value.trim();

      if (!id) {
        loginError.textContent = 'ID를 입력하세요.';
        loginId.focus();
        return;
      }

      if (password !== '1234') {
        loginError.textContent = 'Password가 올바르지 않습니다.';
        loginPassword.focus();
        return;
      }

      loginError.textContent = '';
      sessionStorage.setItem('agent_workspace_logged_in', 'true');
      showMenu();
    });

    logoutButton.addEventListener('click', () => {
      sessionStorage.removeItem('agent_workspace_logged_in');
      showLogin();
    });
  </script>
</body>
</html>
