<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGENT1 : PRD 생성 도우미 </title>
  <link rel="stylesheet" href="./asset/css/styles.css" />
</head>
<body>
  <div class="app">
    
    <!-- 헤더 시작 -->
    <header class="header">      
    
      <section class="header_col header_brand" data-header-col="1">
        <div class="header_logo"></div>
        <div>
          <h1>PRD 생성 도우미 [ AGENT1 ]</h1>
          <p>Project Requirement Description Assistant</p>
        </div>
      </section>

    
      <section class="header_col header_actions" data-header-col="3">
        <div class="header_preset_group" aria-label="grid preset">
          <span>Grid Preset:</span>
          <button class="header_preset_btn is_active" data-preset="balanced">균등 [1:1:1]</button>
          <button class="header_preset_btn" data-preset="focus">포커스 [1:2:1]</button>
          <button class="header_preset_btn" data-preset="prd">PRD 중심</button>
          <button class="header_preset_btn" data-preset="spec">Spec 중심</button>
        </div>
        
        <div class="header_column_toggle_group" aria-label="column toggle">
          <button class="header_column_toggle_btn is_active" data-toggle-col="1">1</button>
          <button class="header_column_toggle_btn is_active" data-toggle-col="2">2</button>
          <button class="header_column_toggle_btn is_active" data-toggle-col="3">3</button>
        </div>
      
      </section>
    </header>
    <!-- 헤더 끝 -->


    <main class="content" id="content">
      <section class="section section1" data-col="1" aria-label="Requirement Source">
        
        <div class="common_panel">  
          
          <div class="common_panel_head">  
            <div><h2>요구사항 등록 관리</h2></div>
            <button class="common_close_col" data-close-col="1" title="1컬럼 닫기">×</button>
          </div>

          <div class="section1_search_card">
            <div class="section1_search_input_wrap">
              <span>⌕</span>
              <input id="section1_search_input" type="search" placeholder="요구 사항 검색..." />
            </div>
            <div class="section1_filter_row">
              <span>필터:</span>
              <button class="section1_filter_btn is_active" data-filter="all">모든 채널</button>
              <button class="section1_filter_btn" data-filter="JIRA">JIRA</button>
              <button class="section1_filter_btn" data-filter="Slack">Slack</button>
              <button class="section1_filter_btn" data-filter="File">File</button>
              <button class="section1_filter_btn" data-filter="Direct">Direct</button>
            </div>
          </div>
          
          <div class="section1_list_box">
            <div class="section1_list_toolbar">
              <label class="section1_select_all"><input type="checkbox" id="section1_select_all" /> 필터 대상 전체 선택</label>
              <span>선택됨 : <strong id="section1_selected_count_mini">0</strong> / <strong id="section1_total_count">4</strong></span>
            </div>
            <div class="section1_requirement_list" id="section1_requirement_list"></div>
          </div>


          <div class="section1_add_source_box">
            <button class="section1_add_source_btn" id="section1_btn_file_source">＋ 파일 등록</button>
            <button class="section1_add_source_btn" id="section1_btn_direct_source">＋ 직접 등록</button>
          </div>

          
          <div class="section1_selected_card">
            <div class="section1_selected_head">
              <strong>선택된 요구사항 <span id="section1_selected_count">0</span></strong>
              <button id="section1_btn_clear_selection">선택 해제</button>
            </div>
            <div class="section1_selected_list" id="section1_selected_list">
              <p class="text_muted">선택된 요구사항이 없습니다.</p>
            </div>
          </div>

          <button class="section1_primary_action" id="section1_btn_confirm_selection" disabled>선택 완료 및 충돌 검토 →</button>
        </div>
      </section>

      <div class="common_resizer" data-resizer="1" role="separator" aria-label="1컬럼 너비 조절"></div>

      
<!-- 2컬럼 시작
      <section class="section section2" data-col="2" aria-label="PRD Workspace">

                <option value="prd-backoffice-template-v1.md">prd-backoffice-template-v1.md</option>
              </select>
            </label>
          
            <label>

              <button class="common_small_btn" id="section2_btn_next_step">다음 프로세스</button>
            </div>
            <div class="section2_steps" id="section2_steps">
              <div class="section2_step is_done"><span>✓</span><em>요구사항 수집</em></div>
              <div class="section2_step"><span>2</span><em>정규화</em></div>
              <div class="section2_step"><span>3</span><em>병합/중복 제거</em></div>
              <div class="section2_step"><span>4</span><em>충돌 체크</em></div>
              <div class="section2_step"><span>5</span><em>PRD 생성</em></div>
              <div class="section2_step"><span>6</span><em>저장</em></div>
            </div>
          </section>

          <section class="section2_viewer_card">
            <div class="section2_viewer_tabs">
              <button class="section2_viewer_tab is_active" data-view="preview">PRD Viewer</button>
              <button class="section2_viewer_tab" data-view="raw">Raw (Markdown)</button>
              <button class="section2_viewer_tab" data-view="history">버전 히스토리</button>
              <div class="common_spacer"></div>
              <button class="common_small_btn" id="section2_btn_copy_prd">복사</button>
              <button class="common_small_btn" id="section2_btn_download_prd">Markdown 다운로드</button>
            </div>
            <article class="section2_prd_preview" id="section2_prd_preview">
              <div class="common_empty_state">
                <div>?</div>
                <p>생성된 기안 문서가 존재하지 않습니다.</p>
              </div>
            </article>
            <textarea class="section2_raw_view is_hidden" id="section2_prd_raw" spellcheck="false"></textarea>
          </section>

          <section class="section2_feedback_card">
            <strong>PRD 피드백 / 수정 요청</strong>
            <div class="section2_feedback_row">
              <input id="section2_feedback_input" type="text" placeholder="피드백을 입력하세요. 예: 예외 케이스 추가, 정책 상세화, KPI 추가 등" />
              <button id="section2_btn_feedback">피드백 제출</button>
              <button id="section2_btn_revise_prd">수정 PRD 생성</button>
              <button id="section2_btn_update_prd">현재 문서 업데이트</button>
            </div>
          </section>


          <section class="section2_log_card">
            <div class="section2_log_head">
              <strong>생성 로그</strong>
              <button class="common_link_btn">전체 로그 보기</button>
            </div>
            <table>
              <thead>
                <tr><th>실행 시간</th><th>실행자</th><th>선택 Req 수</th><th>프롬프트</th><th>모델</th><th>상태</th><th>생성 파일</th></tr>
              </thead>
              <tbody id="section2_generation_log">
                <tr><td colspan="7" class="text_muted text_center">아직 생성 로그가 없습니다.</td></tr>
              </tbody>
            </table>
          </section>

        </div>
      </section>
2컬럼 끝 -->
      <div class="common_resizer" data-resizer="2" role="separator" aria-label="2컬럼 너비 조절"></div>

  <dialog id="modal_detail" class="modal_detail">
    <form method="dialog">
      <div class="modal_head">
        <div>
          <span id="modal_badge" class="common_badge">JIRA</span>
          <h3 id="modal_title">요구사항 상세</h3>
        </div>
        <button aria-label="닫기">×</button>
      </div>
      <div class="modal_meta" id="modal_meta"></div>
      <pre id="modal_body"></pre>
      <div class="modal_actions">
        <button value="cancel">닫기</button>
        <button id="modal_select" value="default">선택하기</button>
      </div>
    </form>
  </dialog>

  <div class="toast_message" id="toast_message"></div>
  <script src="./asset/js/app.js"></script>
</body>
</html>
